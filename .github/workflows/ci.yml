name: MPGO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  objc-build-test:
    name: Objective-C — build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # gobjc is deliberately NOT installed: gcc's Objective-C front end
      # lacks -fobjc-arc and cannot compile libMPGO. build.sh selects clang.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnustep \
            gnustep-devel \
            gnustep-make \
            libgnustep-base-dev \
            libobjc4 \
            clang \
            libhdf5-dev \
            zlib1g-dev \
            libssl-dev \
            make

      - name: Show toolchain versions
        run: |
          clang --version || true
          dpkg -s libhdf5-dev | grep Version || true
          dpkg -s gnustep-make | grep Version || true
          dpkg -s libgnustep-base-dev | grep Version || true

      - name: Build libMPGO
        working-directory: objc
        run: ./build.sh

      - name: Run tests
        working-directory: objc
        run: ./build.sh check
