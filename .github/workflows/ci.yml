name: MPGO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  objc-build-test:
    name: Objective-C — build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Toolchain note:
      #
      # We use clang as the Objective-C compiler (libMPGO requires ARC, and
      # gcc's gobjc front end does not support -fobjc-arc). However we still
      # install the `gobjc` package because it pulls in libobjc's runtime
      # headers (objc/objc.h, objc/runtime.h, ...) that GNUstep's Foundation
      # imports. Clang's Linux driver searches gcc's include directories,
      # so installing gobjc is the canonical way to make those headers
      # available to clang on Ubuntu. build.sh still selects clang via
      # CC=clang OBJC=clang for the actual compile.
      #
      # Ubuntu's libgnustep-base-dev uses the gnustep-1.8 fragile ABI (built
      # against GCC's libobjc, not libobjc2). The MPGO preamble auto-detects
      # this and drops -fblocks on that path. Developers building gnustep
      # from source against libobjc2 get gnustep-2.0 + -fblocks automatically.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnustep \
            gnustep-devel \
            gnustep-make \
            libgnustep-base-dev \
            libobjc4 \
            gobjc \
            clang \
            libhdf5-dev \
            zlib1g-dev \
            libssl-dev \
            make

      - name: Show toolchain versions
        run: |
          clang --version || true
          dpkg -s libhdf5-dev | grep Version || true
          dpkg -s gnustep-make | grep Version || true
          dpkg -s libgnustep-base-dev | grep Version || true

      - name: Build libMPGO
        working-directory: objc
        run: ./build.sh

      - name: Run tests
        working-directory: objc
        run: ./build.sh check
